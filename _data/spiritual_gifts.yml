# Spiritual Gifts Inventory — 110 statements, 22 gifts.
# Question n scores toward gift ((n - 1) mod 22): each gift sums questions n, n+22, n+44, n+66, n+88 (0-20 points).

scale:
  - value: 4
    label: Strongly Agree
  - value: 3
    label: Agree Somewhat
  - value: 2
    label: Undecided
  - value: 1
    label: Disagree Somewhat
  - value: 0
    label: Completely Disagree

